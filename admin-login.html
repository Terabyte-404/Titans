<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TITANSPORTS</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 2rem;
        }

        .admin-login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .admin-login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .admin-login-header h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .admin-login-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin: 0;
        }

        .admin-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--primary-orange), #e85d2c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            font-weight: bold;
        }

        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-orange);
            background: rgba(255, 255, 255, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .admin-login-button {
            padding: 1rem;
            background: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .admin-login-button:hover {
            background: #e85d2c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .admin-login-button:disabled {
            background: rgba(255, 107, 53, 0.5);
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            padding: 1rem;
            color: #4caf50;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 8px;
            padding: 1rem;
            color: #f44336;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: var(--primary-orange);
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding: 0.75rem;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
        }

        .security-badge svg {
            width: 20px;
            height: 20px;
            color: #4caf50;
        }

        .security-badge span {
            color: #4caf50;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .admin-login-container {
                padding: 1.5rem;
            }

            .admin-login-card {
                padding: 2rem;
            }

            .admin-login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-logo">T</div>
            
            <div class="admin-login-header">
                <h1>Admin Login</h1>
                <p>Access the TITANSPORTS admin panel</p>
            </div>

            <div class="security-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <span>Secure Admin Access</span>
            </div>

            <div class="success-message" id="successMessage"></div>
            <div class="error-message" id="errorMessage"></div>

            <form class="admin-form" id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" placeholder="Enter your admin email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="admin-login-button" id="loginButton">
                    <span id="loginButtonText">Login to Admin Panel</span>
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">← Back to Website</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Admin login function
        async function adminLogin(email, password) {
            try {
                const successMessage = document.getElementById('successMessage');
                const errorMessage = document.getElementById('errorMessage');
                const loginButton = document.getElementById('loginButton');
                const loginButtonText = document.getElementById('loginButtonText');

                // Clear previous messages
                successMessage.style.display = 'none';
                errorMessage.style.display = 'none';

                // Set loading state
                loginButton.disabled = true;
                loginButtonText.innerHTML = '<span class="loading-spinner"></span> Authenticating...';

                // Login with Firebase
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Check if email is verified
                if (!user.emailVerified) {
                    errorMessage.textContent = 'Please verify your email address before accessing admin panel.';
                    errorMessage.style.display = 'block';
                    loginButton.disabled = false;
                    loginButtonText.textContent = 'Login to Admin Panel';
                    await user.sendEmailVerification();
                    return;
                }

                // Check if user has admin role
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();

                if (!userData || userData.role !== 'admin') {
                    errorMessage.textContent = 'Access denied. You do not have admin privileges.';
                    errorMessage.style.display = 'block';
                    loginButton.disabled = false;
                    loginButtonText.textContent = 'Login to Admin Panel';
                    
                    // Logout the user since they don't have admin access
                    await auth.signOut();
                    return;
                }

                // Update last login
                await db.collection('users').doc(user.uid).update({
                    lastLoginAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Success - redirect to admin panel
                successMessage.textContent = '✓ Admin login successful! Redirecting...';
                successMessage.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'admin-enhanced.html';
                }, 1500);

            } catch (error) {
                console.error('Admin login error:', error);
                const errorMessage = document.getElementById('errorMessage');
                const loginButton = document.getElementById('loginButton');
                const loginButtonText = document.getElementById('loginButtonText');

                let errorMessageText = 'Login failed. Please check your credentials.';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessageText = 'No admin account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        errorMessageText = 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        errorMessageText = 'Invalid email address.';
                        break;
                    case 'auth/invalid-credential':
                        errorMessageText = 'Invalid credentials. Please check your email and password.';
                        break;
                    default:
                        errorMessageText = error.message;
                }

                errorMessage.textContent = '✗ ' + errorMessageText;
                errorMessage.style.display = 'block';
                loginButton.disabled = false;
                loginButtonText.textContent = 'Login to Admin Panel';
            }
        }

        // Form submission
        document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            adminLogin(email, password);
        });

        // Check if already logged in as admin
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthState(async (user) => {
                if (user) {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    const userData = userDoc.data();
                    
                    if (userData && userData.role === 'admin') {
                        // Already logged in as admin, redirect to admin panel
                        window.location.href = 'admin-enhanced.html';
                    }
                }
            });
        });
    </script>
</body>
</html>
