<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - TITANSPORTS</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-container {
            min-height: 100vh;
            padding: 4rem 2rem 2rem;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .dashboard-header {
            max-width: 1200px;
            margin: 0 auto 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .dashboard-header h1 {
            color: white;
            font-size: 2.5rem;
            margin: 0;
        }

        .dashboard-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin: 0.5rem 0 0 0;
        }

        .dashboard-nav {
            display: flex;
            gap: 1rem;
        }

        .dashboard-nav a {
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .dashboard-nav a:hover {
            background: var(--primary-orange);
            border-color: var(--primary-orange);
            transform: translateY(-2px);
        }

        .dashboard-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .dashboard-card h2 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .dashboard-card h2 svg {
            width: 24px;
            height: 24px;
            color: var(--primary-orange);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .stat-item .value {
            color: var(--primary-orange);
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .stat-item .label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .recent-orders {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .order-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .order-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .order-info h4 {
            color: white;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .order-info p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin: 0;
        }

        .order-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .order-status.pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .order-status.shipped {
            background: rgba(33, 150, 243, 0.2);
            color: #2196f3;
        }

        .order-status.delivered {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .action-button {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .action-button:hover {
            background: var(--primary-orange);
            border-color: var(--primary-orange);
            transform: translateX(5px);
        }

        .action-button svg {
            width: 20px;
            height: 20px;
        }

        .welcome-message {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(255, 107, 53, 0.1));
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 16px;
            padding: 2rem;
            grid-column: 1 / -1;
        }

        .welcome-message h2 {
            color: white;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .welcome-message p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            margin: 0;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary-orange);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 107, 53, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-orange);
            flex-shrink: 0;
        }

        .activity-content h4 {
            color: white;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .activity-content p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin: 0;
        }

        .activity-time {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 1024px) {
            .dashboard-content {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 3rem 1rem 1rem;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .dashboard-header h1 {
                font-size: 1.75rem;
            }

            .dashboard-header p {
                font-size: 0.9rem;
            }

            .dashboard-nav {
                width: 100%;
                flex-wrap: wrap;
            }

            .dashboard-nav a {
                flex: 1;
                min-width: 120px;
                text-align: center;
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }

            .dashboard-content {
                grid-template-columns: 1fr;
            }

            .dashboard-card {
                padding: 1.25rem;
            }

            .dashboard-card h2 {
                font-size: 1.25rem;
            }

            .stat-grid {
                grid-template-columns: 1fr;
            }

            .stat-item {
                padding: 1rem;
            }

            .stat-item .value {
                font-size: 2rem;
            }

            .stat-item .label {
                font-size: 0.85rem;
            }

            .order-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .order-status {
                align-self: flex-start;
            }

            .activity-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .action-button {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .dashboard-header h1 {
                font-size: 1.5rem;
            }

            .dashboard-nav a {
                min-width: 100px;
                padding: 0.5rem 0.75rem;
                font-size: 0.8rem;
            }

            .dashboard-card h2 {
                font-size: 1.1rem;
            }

            .dashboard-card h2 svg {
                width: 20px;
                height: 20px;
            }

            .stat-item .value {
                font-size: 1.75rem;
            }

            .activity-icon {
                width: 35px;
                height: 35px;
            }

            .activity-content h4 {
                font-size: 0.85rem;
            }

            .activity-content p {
                font-size: 0.8rem;
            }

            .activity-time {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1>My Dashboard</h1>
                <p>Welcome back, <span id="userName">Loading...</span></p>
            </div>
            <div class="dashboard-nav">
                <a href="profile.html">My Profile</a>
                <a href="index.html#products">Shop</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>

        <div class="dashboard-content" id="dashboardContent">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
