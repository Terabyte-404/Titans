<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIT HUB - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <header>
        <div class="logo">KIT <span>HUB</span> <span style="font-size: 0.8rem; color: #888; font-weight: 500;">Admin</span></div>
        <nav>
            <a href="index.html">Back to Store</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <main class="admin-container">
        <div class="admin-section">
            <h2 class="section-title">ADD NEW PRODUCT</h2>
            <form id="productForm" class="product-form">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required placeholder="e.g., Manchester City Home 2026">
                </div>
                
                <div class="form-group">
                    <label for="productSport">Sport</label>
                    <select id="productSport" required>
                        <option value="">Select Sport</option>
                        <option value="football">Football</option>
                        <option value="basketball">Basketball</option>
                        <option value="nfl">NFL</option>
                        <option value="mlb">MLB</option>
                        <option value="nhl">NHL</option>
                        <option value="cricket">Cricket</option>
                        <option value="rugby">Rugby</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="productLeague">League/Team</label>
                    <input type="text" id="productLeague" required placeholder="e.g., Premier League, NBA, NFL">
                </div>
                
                <div class="form-group">
                    <label for="productPrice">Price (KSH)</label>
                    <input type="number" id="productPrice" required placeholder="e.g., 16900" min="0">
                </div>
                
                <div class="form-group">
                    <label for="productImage">Image URL</label>
                    <input type="url" id="productImage" required placeholder="https://example.com/jersey.jpg">
                </div>
                
                <button type="submit" class="submit-btn">ADD PRODUCT</button>
            </form>
        </div>

        <div class="admin-section">
            <h2 class="section-title">MANAGE PRODUCTS</h2>
            <div class="products-list" id="productsList">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
